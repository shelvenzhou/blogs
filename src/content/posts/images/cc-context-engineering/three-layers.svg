<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 450" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="780" height="450" rx="8" fill="#1e1e2e"/>

  <style>
    .title { font-size: 15px; font-weight: 600; fill: #e2e8f0; }
    .box-title { font-size: 13px; font-weight: 600; fill: #fff; }
    .box-sub { font-size: 10.5px; fill: rgba(255,255,255,0.85); }
    .label { font-size: 11px; fill: #cbd5e1; }
    .label-sm { font-size: 10px; fill: #94a3b8; }
    .label-bold { font-size: 11px; fill: #e2e8f0; font-weight: 600; }
    .tag { font-size: 9.5px; fill: #fff; font-weight: 500; }
    .note { font-size: 10px; fill: #94a3b8; font-style: italic; }
    .detail-title { font-size: 11px; font-weight: 600; }
  </style>

  <!-- Title -->
  <text x="390" y="30" text-anchor="middle" class="title">Context 压缩三层执行链路</text>

  <!-- ===== Main pipeline ===== -->

  <!-- Entry -->
  <rect x="22" y="58" width="100" height="40" rx="20" fill="#262637" stroke="#4b5563" stroke-width="1.5"/>
  <text x="72" y="82" text-anchor="middle" class="label-bold">User Query</text>

  <!-- Arrow 1 -->
  <line x1="122" y1="78" x2="152" y2="78" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="152,73 162,78 152,83" fill="#94a3b8"/>

  <!-- Layer 1: Snip -->
  <rect x="164" y="50" width="155" height="56" rx="8" fill="#2563eb"/>
  <text x="241" y="72" text-anchor="middle" class="box-title">Layer 1: Snip</text>
  <text x="241" y="86" text-anchor="middle" class="box-sub">Shell 输出过滤 | 60-99%</text>
  <rect x="274" y="53" width="40" height="15" rx="7" fill="rgba(255,255,255,0.2)"/>
  <text x="294" y="63.5" text-anchor="middle" class="tag">零成本</text>

  <!-- Arrow 2 -->
  <line x1="319" y1="78" x2="349" y2="78" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="349,73 359,78 349,83" fill="#94a3b8"/>

  <!-- Layer 2: MicroCompact -->
  <rect x="361" y="50" width="155" height="56" rx="8" fill="#7c3aed"/>
  <text x="438" y="72" text-anchor="middle" class="box-title">Layer 2: MicroCompact</text>
  <text x="438" y="86" text-anchor="middle" class="box-sub">Tool result 精准清理</text>
  <rect x="471" y="53" width="40" height="15" rx="7" fill="rgba(255,255,255,0.2)"/>
  <text x="491" y="63.5" text-anchor="middle" class="tag">零成本</text>

  <!-- Arrow 3 -->
  <line x1="516" y1="78" x2="546" y2="78" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="546,73 556,78 546,83" fill="#94a3b8"/>

  <!-- Layer 3: AutoCompact -->
  <rect x="558" y="50" width="155" height="56" rx="8" fill="#d97706"/>
  <text x="635" y="72" text-anchor="middle" class="box-title">Layer 3: AutoCompact</text>
  <text x="635" y="86" text-anchor="middle" class="box-sub">LLM 驱动总结 | 最后防线</text>
  <rect x="668" y="53" width="40" height="15" rx="7" fill="rgba(255,255,255,0.2)"/>
  <text x="688" y="63.5" text-anchor="middle" class="tag">1x LLM</text>

  <!-- Arrow 4 -->
  <line x1="713" y1="78" x2="733" y2="78" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="733,73 743,78 733,83" fill="#94a3b8"/>

  <!-- Exit -->
  <rect x="745" y="62" width="28" height="28" rx="14" fill="#262637" stroke="#4b5563" stroke-width="1.5"/>
  <text x="759" y="80" text-anchor="middle" style="font-size:9px;fill:#cbd5e1">API</text>

  <!-- ===== Detail panels ===== -->

  <!-- Snip detail -->
  <line x1="241" y1="106" x2="241" y2="130" stroke="#3b82f6" stroke-width="1" stroke-dasharray="3,3"/>
  <rect x="50" y="132" width="340" height="130" rx="6" fill="#1a2744" stroke="#2563eb" stroke-width="1" stroke-opacity="0.5"/>
  <text x="220" y="152" text-anchor="middle" class="detail-title" style="fill:#60a5fa">PreToolUse Hook 拦截 Shell 命令</text>

  <!-- Flow -->
  <text x="70" y="176" class="label-sm">bash cmd</text>
  <line x1="125" y1="172" x2="150" y2="172" stroke="#94a3b8" stroke-width="1"/>
  <polygon points="150,168 158,172 150,176" fill="#94a3b8"/>
  <rect x="160" y="162" width="48" height="20" rx="4" fill="#2563eb"/>
  <text x="184" y="176" text-anchor="middle" class="tag">snip</text>
  <line x1="210" y1="172" x2="235" y2="172" stroke="#94a3b8" stroke-width="1"/>
  <polygon points="235,168 243,172 235,176" fill="#94a3b8"/>
  <text x="255" y="176" class="label-sm">filtered output</text>

  <text x="70" y="202" class="label-sm">git log (200 lines)</text>
  <text x="215" y="202" class="label-sm" style="fill:#60a5fa">-&gt;</text>
  <text x="235" y="202" class="label-sm">single-line summary (~85%)</text>
  <text x="70" y="218" class="label-sm">go test (500 lines)</text>
  <text x="215" y="218" class="label-sm" style="fill:#60a5fa">-&gt;</text>
  <text x="235" y="218" class="label-sm">"12 passed, 0 failed" (~97%)</text>
  <text x="70" y="234" class="label-sm">cargo test (2000 lines)</text>
  <text x="215" y="234" class="label-sm" style="fill:#60a5fa">-&gt;</text>
  <text x="235" y="234" class="label-sm">failures only (~99%)</text>
  <text x="220" y="256" text-anchor="middle" class="note">error = passthrough</text>

  <!-- MicroCompact detail -->
  <line x1="438" y1="106" x2="438" y2="130" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="3,3"/>
  <rect x="290" y="275" width="340" height="115" rx="6" fill="#221a3a" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.5"/>
  <text x="460" y="296" text-anchor="middle" class="detail-title" style="fill:#a78bfa">根据 Cache 冷热选择路径</text>

  <!-- Cold path -->
  <rect x="310" y="308" width="140" height="34" rx="4" fill="#2d1f4e" stroke="#6d28d9" stroke-width="1"/>
  <text x="380" y="322" text-anchor="middle" class="label-sm" style="font-weight:600;fill:#c4b5fd">Cold Cache (>60min)</text>
  <text x="380" y="336" text-anchor="middle" class="label-sm" style="fill:#a78bfa">直接替换 content</text>

  <!-- Warm path -->
  <rect x="470" y="308" width="140" height="34" rx="4" fill="#2d1f4e" stroke="#6d28d9" stroke-width="1"/>
  <text x="540" y="322" text-anchor="middle" class="label-sm" style="font-weight:600;fill:#c4b5fd">Warm Cache</text>
  <text x="540" y="336" text-anchor="middle" class="label-sm" style="fill:#a78bfa">cache_edits 逻辑删除</text>

  <text x="310" y="365" class="label-sm">Cold: 物理瘦身，减少发送量</text>
  <text x="310" y="381" class="label-sm">Warm: 保持 100% cache hit + 逻辑清理</text>

  <!-- AutoCompact detail -->
  <line x1="635" y1="106" x2="635" y2="130" stroke="#d97706" stroke-width="1" stroke-dasharray="3,3"/>
  <rect x="480" y="132" width="280" height="130" rx="6" fill="#2a2010" stroke="#d97706" stroke-width="1" stroke-opacity="0.5"/>
  <text x="620" y="152" text-anchor="middle" class="detail-title" style="fill:#fbbf24">Token 超阈值时触发</text>

  <!-- Priority -->
  <rect x="500" y="164" width="115" height="28" rx="4" fill="#3d3010" stroke="#a3842c" stroke-width="1"/>
  <text x="557" y="182" text-anchor="middle" class="label-sm" style="font-weight:600;fill:#fcd34d">Session Memory</text>

  <text x="622" y="182" class="label-sm" style="fill:#fbbf24">fail -&gt;</text>

  <rect x="670" y="164" width="70" height="28" rx="4" fill="#3d3010" stroke="#a3842c" stroke-width="1"/>
  <text x="705" y="182" text-anchor="middle" class="label-sm" style="font-weight:600;fill:#fcd34d">LLM fork</text>

  <text x="500" y="210" class="label-sm">1. 优先用已有 session memory</text>
  <text x="500" y="226" class="label-sm">2. 无需额外 LLM 调用</text>
  <text x="500" y="242" class="label-sm">3. fallback: fork agent 做结构化总结</text>

  <!-- Bottom philosophy -->
  <rect x="140" y="412" width="500" height="26" rx="13" fill="#262637" stroke="#3b3b55" stroke-width="1"/>
  <text x="390" y="430" text-anchor="middle" class="label" style="fill:#94a3b8;font-weight:500">设计哲学：能不调 LLM 就不调 LLM -- Layer 1 &amp; 2 纯本地操作</text>
</svg>

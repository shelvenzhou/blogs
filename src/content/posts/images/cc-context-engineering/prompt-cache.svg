<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 500" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4ade80"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f87171"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="780" height="500" rx="8" fill="#1e1e2e"/>

  <style>
    .title { font-size: 15px; font-weight: 600; fill: #e2e8f0; }
    .subtitle { font-size: 12.5px; fill: #94a3b8; font-weight: 500; }
    .label { font-size: 11px; fill: #cbd5e1; }
    .label-sm { font-size: 10px; fill: #94a3b8; }
    .label-bold { font-size: 11px; fill: #e2e8f0; font-weight: 600; }
  </style>

  <!-- Title -->
  <text x="390" y="32" text-anchor="middle" class="title">Prompt Caching: Cache Hit vs Cache Miss</text>

  <!-- ===== Scenario A: Cache Hit ===== -->
  <text x="390" y="62" text-anchor="middle" class="subtitle">Scenario A: prefix 不变 -- Cache Hit</text>

  <!-- Request 1 -->
  <text x="45" y="92" class="label-bold">Request 1</text>
  <rect x="45" y="100" width="130" height="30" rx="4" fill="#2a3a5c" stroke="#3b5998" stroke-width="1"/>
  <text x="110" y="119" text-anchor="middle" class="label">System Prompt</text>
  <rect x="180" y="100" width="190" height="30" rx="4" fill="#2a3a5c" stroke="#3b5998" stroke-width="1"/>
  <text x="275" y="119" text-anchor="middle" class="label">Turn 1: User + Assistant</text>
  <rect x="375" y="100" width="110" height="30" rx="4" fill="#3d3526" stroke="#a3842c" stroke-width="1"/>
  <text x="430" y="119" text-anchor="middle" class="label">Turn 2: User</text>

  <!-- Cache write bracket -->
  <line x1="45" y1="138" x2="370" y2="138" stroke="#3b5998" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="208" y="153" text-anchor="middle" class="label-sm">Cache Write ($$)</text>

  <!-- Request 2 -->
  <text x="45" y="178" class="label-bold">Request 2</text>
  <rect x="45" y="186" width="130" height="30" rx="4" fill="#1a3a2a" stroke="#2d7a4f" stroke-width="1"/>
  <text x="110" y="205" text-anchor="middle" class="label">System Prompt</text>
  <rect x="180" y="186" width="190" height="30" rx="4" fill="#1a3a2a" stroke="#2d7a4f" stroke-width="1"/>
  <text x="275" y="205" text-anchor="middle" class="label">Turn 1: User + Assistant</text>
  <rect x="375" y="186" width="110" height="30" rx="4" fill="#1a3a2a" stroke="#2d7a4f" stroke-width="1"/>
  <text x="430" y="205" text-anchor="middle" class="label">Turn 2: U + A</text>
  <rect x="490" y="186" width="110" height="30" rx="4" fill="#3d3526" stroke="#a3842c" stroke-width="1"/>
  <text x="545" y="205" text-anchor="middle" class="label">Turn 3: User</text>

  <!-- Cache read bracket -->
  <line x1="45" y1="224" x2="485" y2="224" stroke="#2d7a4f" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="265" y="239" text-anchor="middle" class="label-sm" style="fill:#4ade80">Cache Read ($ = 1/10 price)</text>

  <!-- Result badge A -->
  <rect x="620" y="140" width="140" height="56" rx="6" fill="#132a1e" stroke="#2d7a4f" stroke-width="1"/>
  <text x="690" y="159" text-anchor="middle" style="font-size:12px;fill:#4ade80;font-weight:600">Cache Hit</text>
  <text x="690" y="175" text-anchor="middle" class="label-sm" style="fill:#86efac">prefix 复用 KV cache</text>
  <text x="690" y="189" text-anchor="middle" class="label-sm" style="fill:#86efac">cost 1/10, latency 更低</text>
  <line x1="620" y1="168" x2="505" y2="200" stroke="#4ade80" stroke-width="1" marker-end="url(#arrow-green)"/>

  <!-- ===== Scenario B: Cache Miss ===== -->
  <text x="390" y="280" text-anchor="middle" class="subtitle">Scenario B: 中间被修改 -- Cache Miss</text>

  <!-- Request 1 -->
  <text x="45" y="308" class="label-bold">Request 1</text>
  <rect x="45" y="316" width="130" height="30" rx="4" fill="#2a3a5c" stroke="#3b5998" stroke-width="1"/>
  <text x="110" y="335" text-anchor="middle" class="label">System Prompt</text>
  <rect x="180" y="316" width="190" height="30" rx="4" fill="#2a3a5c" stroke="#3b5998" stroke-width="1"/>
  <text x="275" y="335" text-anchor="middle" class="label">Turn 1: User + Assistant</text>
  <rect x="375" y="316" width="110" height="30" rx="4" fill="#3d3526" stroke="#a3842c" stroke-width="1"/>
  <text x="430" y="335" text-anchor="middle" class="label">Turn 2: User</text>

  <!-- Request 2 with modification -->
  <text x="45" y="380" class="label-bold">Request 2</text>
  <rect x="45" y="388" width="130" height="30" rx="4" fill="#1a3a2a" stroke="#2d7a4f" stroke-width="1"/>
  <text x="110" y="407" text-anchor="middle" class="label">System Prompt</text>
  <rect x="180" y="388" width="190" height="30" rx="4" fill="#3a1c1c" stroke="#b91c1c" stroke-width="1.5"/>
  <text x="275" y="403" text-anchor="middle" class="label">Turn 1 (modified)</text>
  <text x="275" y="415" text-anchor="middle" style="font-size:9px;fill:#f87171">tool result 被清理</text>
  <rect x="375" y="388" width="110" height="30" rx="4" fill="#3a1c1c" stroke="#991b1b" stroke-width="1"/>
  <text x="430" y="407" text-anchor="middle" class="label">Turn 2: U + A</text>
  <rect x="490" y="388" width="110" height="30" rx="4" fill="#3d3526" stroke="#a3842c" stroke-width="1"/>
  <text x="545" y="407" text-anchor="middle" class="label">Turn 3: User</text>

  <!-- Cache miss bracket -->
  <line x1="45" y1="426" x2="175" y2="426" stroke="#2d7a4f" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="110" y="441" text-anchor="middle" class="label-sm" style="fill:#4ade80">Cache Read</text>
  <line x1="180" y1="426" x2="600" y2="426" stroke="#b91c1c" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="390" y="441" text-anchor="middle" class="label-sm" style="fill:#f87171">Cache Miss -- 修改点之后全部重新计算</text>

  <!-- Result badge B -->
  <rect x="620" y="352" width="140" height="56" rx="6" fill="#2a1515" stroke="#b91c1c" stroke-width="1"/>
  <text x="690" y="371" text-anchor="middle" style="font-size:12px;fill:#f87171;font-weight:600">Cache Miss</text>
  <text x="690" y="387" text-anchor="middle" class="label-sm" style="fill:#fca5a5">修改位置之后的 prefix</text>
  <text x="690" y="401" text-anchor="middle" class="label-sm" style="fill:#fca5a5">全部需要重新 Cache Write</text>
  <line x1="620" y1="380" x2="375" y2="403" stroke="#f87171" stroke-width="1" marker-end="url(#arrow-red)"/>

  <!-- Bottom note -->
  <rect x="90" y="462" width="600" height="26" rx="13" fill="#262637" stroke="#3b3b55" stroke-width="1"/>
  <text x="390" y="480" text-anchor="middle" class="label" style="fill:#94a3b8">MicroCompact 的双轨设计本质上在回答：当前 cache 是热的（A）还是冷的（B）？</text>
</svg>
